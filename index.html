<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣旅遊交通碳足跡計算器</title>
    <style>
        :root {
            --primary-color: #aac0af; /* 換成象徵環保減碳的文青綠色 */
            --secondary-color: #f0f4f1;
            --text-color: #4a3e3d;
            --accent-color: #e8a7a1;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #fafbfb;
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(170, 192, 175, 0.2);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #5c7461;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #8fa494;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 15px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--secondary-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: var(--primary-color);
        }
        button.calc-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button.calc-btn:hover {
            background-color: #8fa494;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background-color: #fcfcfc;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            line-height: 1.8;
            font-size: 15px;
        }
        .carbon-bar {
            background-color: #eee;
            height: 12px;
            border-radius: 6px;
            margin-top: 4px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .carbon-progress {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.5s;
        }
        .progress-green {
            background-color: #98ae9d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌱 台灣旅遊交通碳足跡計算器</h1>
        <div class="subtitle">旅行節能減碳 ‧ 守護台灣地方創生</div>
        
        <div class="input-group">
            <label for="distance">預計旅遊交通總里程數 (公里/km)</label>
            <input type="number" id="distance" placeholder="例如：從台北到九份來回約 80" min="1">
        </div>
        
        <button class="calc-btn" onclick="calcCarbon()">計算不同交通工具碳排放</button>
        
        <div id="carbon-result" class="result" style="display:none;"></div>
    </div>

    <script>
        function calcCarbon() {
            const km = parseFloat(document.getElementById('distance').value);
            const resDiv = document.getElementById('carbon-result');

            if (isNaN(km) || km <= 0) {
                alert('請輸入正確的公里數');
                return;
            }

            // 碳排放係數基準 (kg CO2e / 人公里)
            const carEmission = (km * 0.17).toFixed(2);
            const busEmission = (km * 0.03).toFixed(2);
            const trainEmission = (km * 0.01).toFixed(2);

            resDiv.style.display = 'block';
            resDiv.innerHTML = `
                📊 <strong>經由 Codex 技術計算之碳足跡評估：</strong><br><br>
                
                🚗 <strong>自行開車（燃油車）：</strong> ${carEmission} kg CO2e
                <div class="carbon-bar"><div class="carbon-progress" style="width: 100%"></div></div>
                
                🚌 <strong>搭乘大眾客運：</strong> ${busEmission} kg CO2e
                <div class="carbon-bar"><div class="carbon-progress" style="width: 18%"></div></div>
                
                🚄 <strong>搭乘台灣高鐵：</strong> ${trainEmission} kg CO2e
                <div class="carbon-bar"><div class="carbon-progress progress-green" style="width: 6%"></div></div>
                
                💡 <strong>減碳旅遊建議：</strong><br>
                前往九份或大稻埕等文史景點，選擇搭乘高鐵或大眾客運，將比自行開車大幅減少約 <strong>${(carEmission - trainEmission).toFixed(2)} kg</strong> 的碳排放！讓我們用低碳漫遊的方式，更好地體驗台灣常民生活與地方文化。
            `;
        }
    </script>
</body>
</html>
